# This project was developed with assistance from AI tools.
#
# Grant anyuid SCC to the DSPA runner service account so pipeline pods
# can run Isaac Lab (which requires root). After deploying dspa.yaml,
# verify the SA name:  oc get sa -n wbc-training | grep dspa
# Update the subject name below if it differs from "dspa-dspa".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wbc-training-dspa-anyuid
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-dspa
    namespace: wbc-training
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
---
# Grant the pipeline-runner-dspa SA access to the DSPA API.
# The DSPA operator creates the ds-pipeline-user-access-dspa Role but
# does not bind anyone to it — without this binding, pipeline uploads
# and run submissions via the SA token fail with Forbidden.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dspa-user-access
  namespace: wbc-training
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-dspa
    namespace: wbc-training
roleRef:
  kind: Role
  name: ds-pipeline-user-access-dspa
  apiGroup: rbac.authorization.k8s.io
