# This project was developed with assistance from AI tools.
#
# Grant the isaaclab-gpu SA access to the RHOAI MLflow tracking server.
# MLflow uses kubernetes-auth (--app-name=kubernetes-auth) which validates
# callers via SubjectAccessReview on mlflow.kubeflow.org resources.
# Must be cluster-scoped — namespace-scoped Roles don't satisfy the SAR check.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wbc-training-mlflow
rules:
  - apiGroups: ["mlflow.kubeflow.org"]
    resources: ["datasets", "experiments", "registeredmodels"]
    verbs: ["get", "list", "create", "update"]
  - apiGroups: ["mlflow.kubeflow.org"]
    resources: ["gatewayendpoints"]
    verbs: ["get", "list"]
  - apiGroups: ["mlflow.kubeflow.org"]
    resources: ["gatewayendpoints/use"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wbc-training-mlflow
subjects:
  - kind: ServiceAccount
    name: isaaclab-gpu
    namespace: wbc-training
roleRef:
  kind: ClusterRole
  name: wbc-training-mlflow
  apiGroup: rbac.authorization.k8s.io
