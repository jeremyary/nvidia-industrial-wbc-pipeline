# This project was developed with assistance from AI tools.
# VLA ONNX validation Job: verify model shapes, inference, and determinism.
# Bare K8s alternative to the KFP vla_validate_onnx_op component.
apiVersion: batch/v1
kind: Job
metadata:
  name: vla-validate
  namespace: wbc-training
  labels:
    pipeline.wbc/component: vla
    pipeline.wbc/phase: validate
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        pipeline.wbc/component: vla
        pipeline.wbc/phase: validate
    spec:
      restartPolicy: OnFailure
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: validate
          image: quay.io/jary/wbc-vla:v1-arm64
          imagePullPolicy: Always
          command:
            - python
            - -m
            - wbc_pipeline.vla.validate
            - --checkpoint-prefix
            - vla-finetune
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: S3_ENDPOINT
              value: "http://minio.wbc-training.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "wbc-training"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              memory: 4Gi
