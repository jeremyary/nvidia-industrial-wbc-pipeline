# This project was developed with assistance from AI tools.
#
# Grant anyuid SCC to the DSPA runner service account so pipeline pods
# can run Isaac Lab (which requires root). After deploying dspa.yaml,
# verify the SA name:  oc get sa -n wbc-training | grep dspa
# Update the subject name below if it differs from "dspa-dspa".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wbc-training-dspa-anyuid
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-dspa
    namespace: wbc-training
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
