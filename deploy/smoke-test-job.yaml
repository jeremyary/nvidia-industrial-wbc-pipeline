apiVersion: batch/v1
kind: Job
metadata:
  name: isaaclab-smoke-test
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: isaaclab-smoke-test
        pipeline.wbc/phase: smoke
        pipeline.wbc/component: training
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: train
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          args:
            - -m
            - wbc_pipeline.train
            - --task
            - WBC-Velocity-Flat-G1-29DOF-v0
            - --headless
            - --num_envs
            - "64"
            - --max_iterations
            - "10"
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
