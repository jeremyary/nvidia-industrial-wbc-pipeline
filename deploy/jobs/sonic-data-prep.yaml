# This project was developed with assistance from AI tools.
#
# One-time BONES-SEED data preparation: download from HuggingFace, convert CSV to PKL,
# upload to MinIO. Subsequent runs skip work if manifest exists in S3.
apiVersion: batch/v1
kind: Job
metadata:
  name: sonic-data-prep
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: sonic-data-prep
        pipeline.wbc/phase: data-prep
        pipeline.wbc/component: sonic
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      serviceAccountName: isaaclab-gpu
      containers:
        - name: data-prep
          image: quay.io/jary/isaaclab-g1-sonic:latest
          securityContext:
            runAsUser: 0
          args:
            - -m
            - wbc_pipeline.sonic.data_prep
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: S3_ENDPOINT
              value: "http://minio.wbc-training.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "wbc-training"
            - name: S3_DATA_PREFIX
              value: "bones-seed/processed"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: HF_TOKEN
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
            requests:
              cpu: "4"
              memory: 16Gi
