apiVersion: batch/v1
kind: Job
metadata:
  name: phase1-validation
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phase1-validation
        pipeline.wbc/phase: phase1
        pipeline.wbc/component: validation
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: validate
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Phase 1 Validation: Train 100 iterations ==="
              /workspace/isaaclab/isaaclab.sh -p -m wbc_pipeline.train \
                --task WBC-Velocity-Flat-G1-29DOF-v0 \
                --headless \
                --num_envs 64 \
                --max_iterations 100

              echo "=== Phase 1 Validation: Export ONNX ==="
              CHECKPOINT=$(ls -t /workspace/isaaclab/logs/rsl_rl/g1_29dof_flat/model_*.pt | head -1)
              echo "Using checkpoint: ${CHECKPOINT}"
              /workspace/isaaclab/isaaclab.sh -p -m wbc_pipeline.export_onnx \
                --task WBC-Velocity-Flat-G1-29DOF-v0 \
                --headless \
                --checkpoint "${CHECKPOINT}" \
                --output_dir /tmp/onnx_export

              echo "=== Phase 1 Validation: COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
