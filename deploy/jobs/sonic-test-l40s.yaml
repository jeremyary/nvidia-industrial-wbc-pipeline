# This project was developed with assistance from AI tools.
#
# L40S validation job: 1 GPU, 512 envs, 100 iterations.
# Use this to validate SONIC training works before requesting B200 time.
apiVersion: batch/v1
kind: Job
metadata:
  name: sonic-test-l40s
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: sonic-test-l40s
        pipeline.wbc/phase: test
        pipeline.wbc/component: sonic
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: sonic-train
          image: quay.io/jary/isaaclab-g1-sonic:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash"]
          args:
            - -c
            - |
              set -euo pipefail
              echo "=== SONIC L40S Test ==="
              echo "GPUs: 1, Envs: 512, Iterations: 100"
              echo "Start time: $(date -u)"

              cd /workspace/sonic
              /workspace/isaaclab/isaaclab.sh -p -m accelerate launch \
                --num_processes=1 \
                gear_sonic/train_agent_trl.py \
                +exp=manager/universal_token/all_modes/sonic_release \
                num_envs=512 \
                headless=True \
                max_iterations=100

              echo ""
              echo "End time: $(date -u)"
              echo "=== SONIC L40S Test: COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MLFLOW_TRACKING_URI
              value: "https://mlflow.redhat-ods-applications.svc:8443"
            - name: MLFLOW_TRACKING_INSECURE_TLS
              value: "true"
            - name: MLFLOW_EXPERIMENT_NAME
              value: "g1-sonic-locomotion"
            - name: S3_ENDPOINT
              value: "http://minio.wbc-training.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "wbc-training"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: 64Gi
