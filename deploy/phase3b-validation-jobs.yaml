# Phase 3b validation: 3 jobs testing flat regression, rough terrain, and Isaac Lab preset.
# Each job needs its own Isaac Sim session (single-session constraint).
# Apply all at once: oc apply -f deploy/phase3b-validation-jobs.yaml
# They will queue for GPU and run sequentially.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: phase3b-flat-regression
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phase3b-validation
        pipeline.wbc/phase: phase3b
        pipeline.wbc/component: validation
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: validate
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Phase 3b: Flat Env Regression (preset refactor) ==="
              cat > /tmp/validate_flat.py << 'PYEOF'
              import sys, os
              sys.argv = ['train', '--task', 'WBC-Velocity-Flat-G1-29DOF-v0', '--headless', '--num_envs', '64', '--max_iterations', '10']

              from isaaclab.app import AppLauncher
              import argparse
              parser = argparse.ArgumentParser()
              parser.add_argument('--task', type=str)
              parser.add_argument('--num_envs', type=int, default=64)
              parser.add_argument('--max_iterations', type=int, default=10)
              AppLauncher.add_app_launcher_args(parser)
              args = parser.parse_args()
              app_launcher = AppLauncher(args)

              import gymnasium as gym
              from isaaclab_rl.rsl_rl import RslRlVecEnvWrapper
              from rsl_rl.runners import OnPolicyRunner
              import wbc_pipeline.envs

              def _resolve(ep):
                  import importlib
                  mod, cls = ep.rsplit(':', 1)
                  return getattr(importlib.import_module(mod), cls)()

              spec = gym.spec(args.task)
              env_cfg = _resolve(spec.kwargs['env_cfg_entry_point'])
              agent_cfg = _resolve(spec.kwargs['rsl_rl_cfg_entry_point'])
              env_cfg.scene.num_envs = args.num_envs
              agent_cfg.max_iterations = args.max_iterations

              env = gym.make(args.task, cfg=env_cfg)
              env = RslRlVecEnvWrapper(env)

              obs_dim = env.observation_space['policy'].shape[1]
              act_dim = env.num_actions
              print(f'Obs dim: {obs_dim}, Action dim: {act_dim}')
              assert obs_dim == 103, f'Expected 103, got {obs_dim}'
              assert act_dim == 29, f'Expected 29, got {act_dim}'

              log_dir = os.path.join('/workspace/isaaclab/logs/rsl_rl', agent_cfg.experiment_name)
              os.makedirs(log_dir, exist_ok=True)
              runner = OnPolicyRunner(env, agent_cfg.to_dict(), log_dir=log_dir, device=agent_cfg.device)
              runner.learn(num_learning_iterations=agent_cfg.max_iterations, init_at_random_ep_len=True)

              print()
              print('=== Flat env regression PASSED ===')
              print(f'  Obs: {obs_dim}, Actions: {act_dim}')
              print(f'  Task: {args.task}')
              print(f'  Preset refactor verified: training completed without errors')

              env.close()
              app_launcher.app.close()
              PYEOF
              /workspace/isaaclab/isaaclab.sh -p /tmp/validate_flat.py
              echo "=== Phase 3b: Flat Regression COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: phase3b-rough-validation
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phase3b-validation
        pipeline.wbc/phase: phase3b
        pipeline.wbc/component: validation
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: validate
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              ONNX_DIR="/tmp/onnx_export"
              mkdir -p "${ONNX_DIR}"

              echo "=== Phase 3b: Rough Terrain Validation ==="
              cat > /tmp/validate_rough.py << 'PYEOF'
              import sys, os
              sys.argv = ['train', '--task', 'WBC-Velocity-Rough-G1-29DOF-v0', '--headless', '--num_envs', '64', '--max_iterations', '10']

              from isaaclab.app import AppLauncher
              import argparse
              parser = argparse.ArgumentParser()
              parser.add_argument('--task', type=str)
              parser.add_argument('--num_envs', type=int, default=64)
              parser.add_argument('--max_iterations', type=int, default=10)
              AppLauncher.add_app_launcher_args(parser)
              args = parser.parse_args()
              app_launcher = AppLauncher(args)

              import gymnasium as gym
              from isaaclab_rl.rsl_rl import RslRlVecEnvWrapper
              from isaaclab_rl.rsl_rl.exporter import export_policy_as_onnx
              from rsl_rl.runners import OnPolicyRunner
              import wbc_pipeline.envs

              def _resolve(ep):
                  import importlib
                  mod, cls = ep.rsplit(':', 1)
                  return getattr(importlib.import_module(mod), cls)()

              spec = gym.spec(args.task)
              env_cfg = _resolve(spec.kwargs['env_cfg_entry_point'])
              agent_cfg = _resolve(spec.kwargs['rsl_rl_cfg_entry_point'])
              env_cfg.scene.num_envs = args.num_envs
              agent_cfg.max_iterations = args.max_iterations

              env = gym.make(args.task, cfg=env_cfg)
              env = RslRlVecEnvWrapper(env)

              obs_dim = env.observation_space['policy'].shape[1]
              act_dim = env.num_actions
              print(f'Obs dim: {obs_dim}, Action dim: {act_dim}')
              assert obs_dim == 290, f'Expected 290 (103 base + 187 height scan), got {obs_dim}'
              assert act_dim == 29, f'Expected 29, got {act_dim}'

              log_dir = os.path.join('/workspace/isaaclab/logs/rsl_rl', agent_cfg.experiment_name)
              os.makedirs(log_dir, exist_ok=True)
              runner = OnPolicyRunner(env, agent_cfg.to_dict(), log_dir=log_dir, device=agent_cfg.device)
              runner.learn(num_learning_iterations=agent_cfg.max_iterations, init_at_random_ep_len=True)

              print()
              print('=== Exporting ONNX (rough terrain) ===')
              onnx_dir = '/tmp/onnx_export'
              os.makedirs(onnx_dir, exist_ok=True)
              policy = runner.alg.policy
              normalizer = policy.actor_obs_normalizer
              export_policy_as_onnx(policy, path=onnx_dir, normalizer=normalizer, filename='policy.onnx')
              onnx_path = os.path.join(onnx_dir, 'policy.onnx')

              import onnx
              model = onnx.load(onnx_path)
              onnx.checker.check_model(model)
              in_dims = [d.dim_value for d in model.graph.input[0].type.tensor_type.shape.dim]
              out_dims = [d.dim_value for d in model.graph.output[0].type.tensor_type.shape.dim]
              print(f'Input:  name={model.graph.input[0].name!r}, shape={in_dims}')
              print(f'Output: name={model.graph.output[0].name!r}, shape={out_dims}')
              assert in_dims == [1, 290], f'Expected [1, 290], got {in_dims}'
              assert out_dims == [1, 29], f'Expected [1, 29], got {out_dims}'

              print()
              print('=== Rough terrain validation PASSED ===')
              print(f'  Obs: {obs_dim} (103 base + 187 height scan)')
              print(f'  Actions: {act_dim}')
              print(f'  ONNX: input [1, 290], output [1, 29]')
              print(f'  Terrain: generator with ROUGH_TERRAINS_CFG')
              print(f'  Height scanner: RayCasterCfg on torso_link')

              env.close()
              app_launcher.app.close()
              PYEOF
              /workspace/isaaclab/isaaclab.sh -p /tmp/validate_rough.py
              echo "=== Phase 3b: Rough Validation COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: phase3b-isaaclab-preset
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phase3b-validation
        pipeline.wbc/phase: phase3b
        pipeline.wbc/component: validation
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: validate
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Phase 3b: Isaac Lab Stock Preset Validation ==="
              cat > /tmp/validate_isaaclab.py << 'PYEOF'
              import sys, os
              sys.argv = ['train', '--task', 'WBC-Velocity-IsaacLab-Flat-G1-29DOF-v0', '--headless', '--num_envs', '64', '--max_iterations', '10']

              from isaaclab.app import AppLauncher
              import argparse
              parser = argparse.ArgumentParser()
              parser.add_argument('--task', type=str)
              parser.add_argument('--num_envs', type=int, default=64)
              parser.add_argument('--max_iterations', type=int, default=10)
              AppLauncher.add_app_launcher_args(parser)
              args = parser.parse_args()
              app_launcher = AppLauncher(args)

              import gymnasium as gym
              from isaaclab_rl.rsl_rl import RslRlVecEnvWrapper
              from rsl_rl.runners import OnPolicyRunner
              import wbc_pipeline.envs

              def _resolve(ep):
                  import importlib
                  mod, cls = ep.rsplit(':', 1)
                  return getattr(importlib.import_module(mod), cls)()

              spec = gym.spec(args.task)
              env_cfg = _resolve(spec.kwargs['env_cfg_entry_point'])
              agent_cfg = _resolve(spec.kwargs['rsl_rl_cfg_entry_point'])
              env_cfg.scene.num_envs = args.num_envs
              agent_cfg.max_iterations = args.max_iterations

              env = gym.make(args.task, cfg=env_cfg)
              env = RslRlVecEnvWrapper(env)

              obs_dim = env.observation_space['policy'].shape[1]
              act_dim = env.num_actions
              print(f'Obs dim: {obs_dim}, Action dim: {act_dim}')
              assert obs_dim == 103, f'Expected 103, got {obs_dim}'
              assert act_dim == 29, f'Expected 29, got {act_dim}'

              assert env_cfg.actions.joint_pos.scale == 0.5, f'Expected action_scale 0.5, got {env_cfg.actions.joint_pos.scale}'
              print(f'Action scale: {env_cfg.actions.joint_pos.scale} (Isaac Lab stock)')

              log_dir = os.path.join('/workspace/isaaclab/logs/rsl_rl', agent_cfg.experiment_name)
              os.makedirs(log_dir, exist_ok=True)
              runner = OnPolicyRunner(env, agent_cfg.to_dict(), log_dir=log_dir, device=agent_cfg.device)
              runner.learn(num_learning_iterations=agent_cfg.max_iterations, init_at_random_ep_len=True)

              print()
              print('=== Isaac Lab preset validation PASSED ===')
              print(f'  Obs: {obs_dim}, Actions: {act_dim}')
              print(f'  Action scale: 0.5 (Isaac Lab stock)')
              print(f'  Default positions: G1_29DOF_CFG stock values')
              print(f'  Phase oscillator: disabled (freq_hz=0.0)')

              env.close()
              app_launcher.app.close()
              PYEOF
              /workspace/isaaclab/isaaclab.sh -p /tmp/validate_isaaclab.py
              echo "=== Phase 3b: Isaac Lab Preset COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
