# This project was developed with assistance from AI tools.
#
# Kueue resource management for GPU training workloads.
# Requires: Kueue operator installed (RHOAI distributed workloads component).
#
# Usage:
#   oc apply -f deploy/infra/kueue.yaml
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-flavor
spec:
  nodeLabels:
    nvidia.com/gpu.present: "true"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: wbc-training-gpu
spec:
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: ${WBC_NAMESPACE}
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: "cpu"
              nominalQuota: 64
            - name: "memory"
              nominalQuota: 512Gi
            - name: "nvidia.com/gpu"
              nominalQuota: 8
  preemption:
    withinClusterQueue: LowerPriority
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: wbc-training-queue
  namespace: ${WBC_NAMESPACE}
spec:
  clusterQueue: wbc-training-gpu
