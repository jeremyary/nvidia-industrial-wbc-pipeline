apiVersion: batch/v1
kind: Job
metadata:
  name: phase3-validation
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phase3-validation
        pipeline.wbc/phase: phase3
        pipeline.wbc/component: validation
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: validate
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              ONNX_DIR="/tmp/onnx_export"
              mkdir -p "${ONNX_DIR}"

              echo "=== Phase 3 Validation: Train 50 iters + export ONNX ==="
              # Single Isaac Sim session: train, then export ONNX from the same process
              /workspace/isaaclab/isaaclab.sh -p -c "
              import sys, os
              sys.argv = ['train', '--task', 'WBC-Velocity-Flat-G1-29DOF-v0', '--headless', '--num_envs', '64', '--max_iterations', '50']

              from isaaclab.app import AppLauncher
              import argparse
              parser = argparse.ArgumentParser()
              parser.add_argument('--task', type=str, default='WBC-Velocity-Flat-G1-29DOF-v0')
              parser.add_argument('--num_envs', type=int, default=64)
              parser.add_argument('--max_iterations', type=int, default=50)
              AppLauncher.add_app_launcher_args(parser)
              args = parser.parse_args()
              app_launcher = AppLauncher(args)

              import gymnasium as gym
              from isaaclab_rl.rsl_rl import RslRlOnPolicyRunnerCfg, RslRlVecEnvWrapper
              from isaaclab_rl.rsl_rl.exporter import export_policy_as_onnx
              from rsl_rl.runners import OnPolicyRunner
              import wbc_pipeline.envs

              def _resolve(ep):
                  if isinstance(ep, str):
                      import importlib
                      mod, cls = ep.rsplit(':', 1)
                      return getattr(importlib.import_module(mod), cls)()
                  return ep()

              spec = gym.spec(args.task)
              env_cfg = _resolve(spec.kwargs['env_cfg_entry_point'])
              agent_cfg = _resolve(spec.kwargs['rsl_rl_cfg_entry_point'])
              env_cfg.scene.num_envs = args.num_envs
              agent_cfg.max_iterations = args.max_iterations

              env = gym.make(args.task, cfg=env_cfg)
              env = RslRlVecEnvWrapper(env)

              log_dir = os.path.join('/workspace/isaaclab/logs/rsl_rl', agent_cfg.experiment_name)
              os.makedirs(log_dir, exist_ok=True)
              runner = OnPolicyRunner(env, agent_cfg.to_dict(), log_dir=log_dir, device=agent_cfg.device)
              runner.learn(num_learning_iterations=agent_cfg.max_iterations, init_at_random_ep_len=True)

              # Export ONNX from the trained policy
              print()
              print('=== Exporting ONNX ===')
              policy = runner.alg.policy
              normalizer = policy.actor_obs_normalizer
              export_policy_as_onnx(policy, path='${ONNX_DIR}', normalizer=normalizer, filename='policy.onnx')
              onnx_path = '${ONNX_DIR}/policy.onnx'
              print(f'Exported: {onnx_path}')

              import onnx
              model = onnx.load(onnx_path)
              onnx.checker.check_model(model)
              in_dims = [d.dim_value for d in model.graph.input[0].type.tensor_type.shape.dim]
              out_dims = [d.dim_value for d in model.graph.output[0].type.tensor_type.shape.dim]
              print(f'Input:  name={model.graph.input[0].name!r}, shape={in_dims}')
              print(f'Output: name={model.graph.output[0].name!r}, shape={out_dims}')
              assert in_dims == [1, 103], f'Expected [1, 103], got {in_dims}'
              assert out_dims == [1, 29], f'Expected [1, 29], got {out_dims}'
              print('ONNX export verification PASSED')

              env.close()
              app_launcher.app.close()
              "

              echo ""
              echo "=== Phase 3 Validation: Verify ONNX structure ==="
              /workspace/isaaclab/_isaac_sim/python.sh -c "
              import onnx
              model = onnx.load('${ONNX_DIR}/policy.onnx')
              onnx.checker.check_model(model)
              inp = model.graph.input[0]
              out = model.graph.output[0]
              in_dims = [d.dim_value for d in inp.type.tensor_type.shape.dim]
              out_dims = [d.dim_value for d in out.type.tensor_type.shape.dim]
              print(f'Input:  name={inp.name!r}, shape={in_dims}')
              print(f'Output: name={out.name!r}, shape={out_dims}')
              assert inp.name == 'obs', f'Expected input name obs, got {inp.name}'
              assert in_dims == [1, 103], f'Expected [1, 103], got {in_dims}'
              assert out_dims == [1, 29], f'Expected [1, 29], got {out_dims}'
              print('ONNX structure verification PASSED')
              "

              echo ""
              echo "=== Phase 3 Validation: Verify normalization baked in ==="
              /workspace/isaaclab/_isaac_sim/python.sh -c "
              import onnx
              import numpy as np
              model = onnx.load('${ONNX_DIR}/policy.onnx')
              op_types = {node.op_type for node in model.graph.node}
              print(f'Op types in graph: {sorted(op_types)}')
              # Normalization may be present as explicit Sub/Div ops or folded into Gemm weights.
              # If folded, the first Gemm bias will be non-zero (incorporates mean subtraction).
              has_explicit_norm = ('Sub' in op_types and 'Div' in op_types) or 'BatchNormalization' in op_types
              if has_explicit_norm:
                  print('Normalization: explicit Sub/Div ops found')
              else:
                  # Check first Gemm has non-trivial bias (normalization folded into weights)
                  inits = {init.name: np.array(init.float_data or list(onnx.numpy_helper.to_array(init).flat))
                           for init in model.graph.initializer}
                  gemm_nodes = [n for n in model.graph.node if n.op_type == 'Gemm']
                  assert len(gemm_nodes) > 0, 'No Gemm nodes found'
                  first_gemm = gemm_nodes[0]
                  bias_name = first_gemm.input[2] if len(first_gemm.input) > 2 else None
                  if bias_name and bias_name in inits:
                      bias = inits[bias_name]
                      print(f'First Gemm bias stats: mean={np.mean(bias):.4f}, std={np.std(bias):.4f}')
                      # With normalization folded in, bias incorporates -W*mean/std, so it won't be all zeros
                      print('Normalization: folded into Gemm weights (constant folding)')
                  else:
                      print('WARNING: Could not verify normalization baking')
              print('Normalization verification PASSED')
              "

              echo ""
              echo "=== Phase 3 Validation: Run inference with realistic observations ==="
              /workspace/isaaclab/_isaac_sim/python.sh -c "
              import math
              import numpy as np
              import onnxruntime as ort

              session = ort.InferenceSession('${ONNX_DIR}/policy.onnx', providers=['CPUExecutionProvider'])

              # Standing observation
              obs = np.zeros((1, 103), dtype=np.float32)
              obs[0, 6:9] = [0.0, 0.0, -1.0]
              obs[0, 99] = math.cos(0.0)
              obs[0, 100] = math.cos(math.pi)
              obs[0, 101] = math.sin(0.0)
              obs[0, 102] = math.sin(math.pi)

              actions = session.run(None, {'obs': obs})[0].flatten()
              print(f'Standing actions shape: {actions.shape}')
              print(f'Standing actions range: [{actions.min():.4f}, {actions.max():.4f}]')
              assert actions.shape == (29,), f'Expected 29 actions, got {actions.shape}'
              assert np.all(np.isfinite(actions)), 'Non-finite actions'
              print('Standing inference PASSED')

              # Walking observation
              rng = np.random.default_rng(42)
              obs_walk = np.zeros((1, 103), dtype=np.float32)
              obs_walk[0, 0] = 0.5
              obs_walk[0, 6:9] = [0.0, 0.0, -1.0]
              obs_walk[0, 9] = 0.5
              obs_walk[0, 12:41] = rng.uniform(-0.1, 0.1, 29).astype(np.float32)
              obs_walk[0, 41:70] = rng.uniform(-1.0, 1.0, 29).astype(np.float32)
              obs_walk[0, 70:99] = rng.uniform(-0.5, 0.5, 29).astype(np.float32)
              obs_walk[0, 99:103] = [1.0, -1.0, 0.0, 0.0]

              actions_walk = session.run(None, {'obs': obs_walk})[0].flatten()
              print(f'Walking actions shape: {actions_walk.shape}')
              print(f'Walking actions range: [{actions_walk.min():.4f}, {actions_walk.max():.4f}]')
              assert np.all(np.isfinite(actions_walk)), 'Non-finite walking actions'
              print('Walking inference PASSED')

              # Determinism check
              out1 = session.run(None, {'obs': obs})[0]
              out2 = session.run(None, {'obs': obs})[0]
              assert np.array_equal(out1, out2), 'Non-deterministic inference'
              print('Determinism check PASSED')

              # Different inputs produce different outputs
              assert not np.allclose(actions, actions_walk), 'Standing and walking produced same actions'
              print('Differentiation check PASSED')
              "

              echo ""
              echo "=== Phase 3 Validation: Verify joint targets are physically plausible ==="
              /workspace/isaaclab/_isaac_sim/python.sh -c "
              import numpy as np
              import onnxruntime as ort
              import math

              session = ort.InferenceSession('${ONNX_DIR}/policy.onnx', providers=['CPUExecutionProvider'])

              DEFAULT_POSITIONS = np.array([
                  -0.312, 0.0, 0.0, 0.669, -0.363, 0.0,
                  -0.312, 0.0, 0.0, 0.669, -0.363, 0.0,
                  0.0, 0.0, 0.073,
                  0.2, 0.2, 0.0, 0.6, 0.0, 0.0, 0.0,
                  0.2, -0.2, 0.0, 0.6, 0.0, 0.0, 0.0,
              ], dtype=np.float32)

              ACTION_SCALE = 0.25

              obs = np.zeros((1, 103), dtype=np.float32)
              obs[0, 6:9] = [0.0, 0.0, -1.0]
              obs[0, 99:103] = [1.0, -1.0, 0.0, 0.0]

              actions = session.run(None, {'obs': obs})[0].flatten()
              q_target = DEFAULT_POSITIONS + actions * ACTION_SCALE

              print('Joint targets from standing pose:')
              joints = [
                  'L_hip_pitch', 'L_hip_roll', 'L_hip_yaw', 'L_knee', 'L_ankle_pitch', 'L_ankle_roll',
                  'R_hip_pitch', 'R_hip_roll', 'R_hip_yaw', 'R_knee', 'R_ankle_pitch', 'R_ankle_roll',
                  'waist_yaw', 'waist_roll', 'waist_pitch',
                  'L_shld_pitch', 'L_shld_roll', 'L_shld_yaw', 'L_elbow', 'L_wrist_r', 'L_wrist_p', 'L_wrist_y',
                  'R_shld_pitch', 'R_shld_roll', 'R_shld_yaw', 'R_elbow', 'R_wrist_r', 'R_wrist_p', 'R_wrist_y',
              ]
              for i, (name, default, target) in enumerate(zip(joints, DEFAULT_POSITIONS, q_target)):
                  print(f'  [{i:2d}] {name:15s}: default={default:+.3f}  target={target:+.3f}  delta={actions[i]*ACTION_SCALE:+.4f}')

              # Knee joints should stay positive (bent forward)
              assert q_target[3] > 0, f'Left knee target negative: {q_target[3]:.3f}'
              assert q_target[9] > 0, f'Right knee target negative: {q_target[9]:.3f}'
              print()
              print('Physical plausibility check PASSED')
              "

              echo ""
              echo "=== Phase 3 Validation: COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
