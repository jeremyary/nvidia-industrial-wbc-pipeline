# This project was developed with assistance from AI tools.
apiVersion: batch/v1
kind: Job
metadata:
  name: sonic-smoke-test
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: sonic-smoke-test
        pipeline.wbc/phase: smoke
        pipeline.wbc/component: sonic
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: sonic-test
          image: quay.io/jary/isaaclab-g1-sonic:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash"]
          args:
            - -c
            - |
              set -euo pipefail
              echo "=== SONIC Smoke Test ==="
              echo "Verifying SONIC imports..."
              /workspace/isaaclab/isaaclab.sh -p -c "
              import gear_sonic
              print(f'gear_sonic imported from: {gear_sonic.__file__}')
              import hydra
              print(f'hydra version: {hydra.__version__}')
              import accelerate
              print(f'accelerate version: {accelerate.__version__}')
              import trl
              print(f'trl version: {trl.__version__}')
              from wbc_pipeline.sonic.config import SonicTrainingConfig
              cfg = SonicTrainingConfig()
              print(f'SonicTrainingConfig: num_gpus={cfg.num_gpus}, num_envs={cfg.num_envs}')
              print()
              print('=== SONIC Smoke Test: PASSED ===')
              "
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
