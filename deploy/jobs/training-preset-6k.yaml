apiVersion: batch/v1
kind: Job
metadata:
  name: training-preset-6k
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 28800
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: training-preset-6k
        pipeline.wbc/phase: training
        pipeline.wbc/component: training
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 300
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: train
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              ONNX_DIR="/tmp/onnx_export"
              mkdir -p "${ONNX_DIR}"

              echo "=== Training Isaac Lab Preset: 4096 envs x 6000 iters ==="
              echo "Start time: $(date -u)"

              /workspace/isaaclab/isaaclab.sh -p -c "
              import sys, os
              sys.argv = ['train', '--task', 'WBC-Velocity-IsaacLab-Flat-G1-29DOF-v0', '--headless',
                          '--num_envs', '4096', '--max_iterations', '6000']

              from isaaclab.app import AppLauncher
              import argparse
              parser = argparse.ArgumentParser()
              parser.add_argument('--task', type=str)
              parser.add_argument('--num_envs', type=int)
              parser.add_argument('--max_iterations', type=int)
              AppLauncher.add_app_launcher_args(parser)
              args = parser.parse_args()
              app_launcher = AppLauncher(args)

              import gymnasium as gym
              from isaaclab_rl.rsl_rl import RslRlVecEnvWrapper
              from isaaclab_rl.rsl_rl.exporter import export_policy_as_onnx
              import wbc_pipeline.envs
              from wbc_pipeline.config import TrainingConfig
              from wbc_pipeline.runner import WBCRunner

              def _resolve(ep):
                  if isinstance(ep, str):
                      import importlib
                      mod, cls = ep.rsplit(':', 1)
                      return getattr(importlib.import_module(mod), cls)()
                  return ep()

              spec = gym.spec(args.task)
              env_cfg = _resolve(spec.kwargs['env_cfg_entry_point'])
              agent_cfg = _resolve(spec.kwargs['rsl_rl_cfg_entry_point'])
              env_cfg.scene.num_envs = args.num_envs
              agent_cfg.max_iterations = args.max_iterations

              env = gym.make(args.task, cfg=env_cfg)
              env = RslRlVecEnvWrapper(env)

              training_cfg = TrainingConfig()
              log_dir = os.path.join('/workspace/isaaclab/logs/rsl_rl', agent_cfg.experiment_name)
              os.makedirs(log_dir, exist_ok=True)
              runner = WBCRunner(env, agent_cfg.to_dict(), log_dir=log_dir,
                                device=agent_cfg.device, training_cfg=training_cfg)
              runner.learn(num_learning_iterations=agent_cfg.max_iterations, init_at_random_ep_len=True)

              print()
              print('=== Exporting ONNX policy ===')
              policy = runner.alg.policy
              normalizer = policy.actor_obs_normalizer
              export_policy_as_onnx(policy, path='${ONNX_DIR}', normalizer=normalizer, filename='policy.onnx')

              import onnx
              model = onnx.load('${ONNX_DIR}/policy.onnx')
              in_dims = [d.dim_value for d in model.graph.input[0].type.tensor_type.shape.dim]
              out_dims = [d.dim_value for d in model.graph.output[0].type.tensor_type.shape.dim]
              print(f'ONNX exported: input {in_dims}, output {out_dims}')

              if runner._s3_client is not None:
                  s3_cfg = training_cfg.s3
                  runner._s3_client.upload_file('${ONNX_DIR}/policy.onnx',
                      s3_cfg.bucket, f'{s3_cfg.prefix}/policy.onnx')
                  print(f'ONNX uploaded to s3://{s3_cfg.bucket}/{s3_cfg.prefix}/policy.onnx')

              env.close()
              app_launcher.app.close()
              "

              echo ""
              echo "End time: $(date -u)"
              echo "=== Training Preset 6K: COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: S3_ENDPOINT
              value: "http://minio.wbc-training.svc:9000"
            - name: S3_BUCKET
              value: "wbc-training"
            - name: S3_PREFIX
              value: "checkpoints-preset-6k"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MLFLOW_TRACKING_URI
              value: "https://mlflow.redhat-ods-applications.svc:8443"
            - name: MLFLOW_TRACKING_INSECURE_TLS
              value: "true"
            - name: CHECKPOINT_INTERVAL
              value: "100"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: 64Gi
