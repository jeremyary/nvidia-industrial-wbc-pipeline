apiVersion: batch/v1
kind: Job
metadata:
  name: phase2-validation
  namespace: wbc-training
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phase2-validation
        pipeline.wbc/phase: phase2
        pipeline.wbc/component: validation
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: isaaclab-gpu
      containers:
        - name: validate
          image: quay.io/jary/isaaclab-g1-train:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "=== Phase 2 Validation: Train 20 iters with S3 + MLflow ==="
              /workspace/isaaclab/isaaclab.sh -p -m wbc_pipeline.train \
                --task WBC-Velocity-Flat-G1-29DOF-v0 \
                --headless \
                --num_envs 64 \
                --max_iterations 20

              echo ""
              echo "=== Phase 2 Validation: Verify S3 checkpoints ==="
              /workspace/isaaclab/isaaclab.sh -p -m wbc_pipeline.validate s3

              echo ""
              echo "=== Phase 2 Validation: Verify MLflow experiment ==="
              /workspace/isaaclab/isaaclab.sh -p -m wbc_pipeline.validate mlflow

              echo ""
              echo "=== Phase 2 Validation: Resume from S3 checkpoint ==="
              /workspace/isaaclab/isaaclab.sh -p -m wbc_pipeline.train \
                --task WBC-Velocity-Flat-G1-29DOF-v0 \
                --headless \
                --num_envs 64 \
                --max_iterations 25 \
                --resume s3

              echo ""
              echo "=== Phase 2 Validation: COMPLETE ==="
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: S3_ENDPOINT
              value: "http://minio.wbc-training.svc:9000"
            - name: S3_BUCKET
              value: "wbc-training"
            - name: S3_PREFIX
              value: "checkpoints"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MLFLOW_TRACKING_URI
              value: "https://mlflow.redhat-ods-applications.svc:8443"
            - name: MLFLOW_TRACKING_INSECURE_TLS
              value: "true"
            - name: MLFLOW_TRACKING_AUTH
              value: "kubernetes"
            - name: CHECKPOINT_INTERVAL
              value: "10"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 32Gi
